name: Build Gentoo Epiphany
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Gentoo Container
        run: |
          docker run --privileged --name gentoo-builder -d gentoo/stage3:amd64-nomultilib tail -f /dev/null
          sleep 5

      - name: Configure Portage
        run: |
          docker exec gentoo-builder bash -c "cat > /etc/portage/make.conf" << 'EOF'
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          MAKEOPTS="-j2"
          USE="wayland elogind dbus vulkan intel -systemd -bluetooth -wifi -cdrom -floppy -dvd -dvdr -cups -kde -gnome -plasma -aqua -qt5 -qt6 -X -accessibility -branding -ipod -smartcard -kvm"
          VIDEO_CARDS="intel i965"
          ACCEPT_LICENSE="*"
          ACCEPT_KEYWORDS="~amd64"
          PKGDIR="/packages"
          EOF

          # Setup Package USE flags
          docker exec gentoo-builder mkdir -p /etc/portage/package.use
          docker exec gentoo-builder bash -c 'echo "media-libs/harfbuzz icu" >> /etc/portage/package.use/epiphany'
          docker exec gentoo-builder bash -c 'echo "dev-libs/libxml2 icu" >> /etc/portage/package.use/epiphany'
          docker exec gentoo-builder bash -c 'echo "app-crypt/gcr gtk" >> /etc/portage/package.use/epiphany'
          docker exec gentoo-builder bash -c 'echo "dev-libs/libportal gtk" >> /etc/portage/package.use/epiphany'
          docker exec gentoo-builder bash -c 'echo "net-libs/webkit-gtk wayland jumbo-build" >> /etc/portage/package.use/epiphany'
          docker exec gentoo-builder bash -c 'echo "x11-libs/cairo glib svg" >> /etc/portage/package.use/epiphany'

      - name: Sync and Build
        run: |
          docker exec gentoo-builder emerge-webrsync
          docker exec gentoo-builder mkdir -p /packages
          
          # Force accept keywords for the dependencies that were masked
          docker exec gentoo-builder emerge --verbose --buildpkg --onlydeps --autounmask-write=y www-client/epiphany || true
          # Run it again to apply the autounmask changes
          docker exec gentoo-builder emerge --verbose --buildpkg --onlydeps www-client/epiphany
          
          # The Final Boss Build
          docker exec gentoo-builder emerge --verbose --buildpkg www-client/epiphany

      - name: Prepare Artifacts
        if: always()
        run: |
          docker cp gentoo-builder:/packages ./local_packages || echo "No packages found"

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: epiphany-binpkg
          path: ./local_pack ages/
