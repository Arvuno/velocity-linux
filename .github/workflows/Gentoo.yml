name: Build Gentoo Binary
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gentoo Build
        run: |
          docker run --privileged --name gentoo-builder -d gentoo/stage3:amd64-nomultilib tail -f /dev/null
          
          # Setup make.conf with YOUR flags
          docker exec gentoo-builder bash -c 'cat > /etc/portage/make.conf << EOF
          COMMON_FLAGS="-O2 -march=x86-64 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          MAKEOPTS="-j$(nproc)"
          USE="wayland elogind dbus vulkan intel -systemd -bluetooth -wifi -cdrom -floppy -dvd -ipod -smartcard -kvm -kde -gnome -plasma -aqua -qt5 -qt6 -X -accessibility -branding"
          VIDEO_CARDS="intel i965"
          ACCEPT_LICENSE="*"
          PKGDIR="/packages"
          EOF'

          # Sync and build (This is the long part)
          docker exec gentoo-builder emaint sync -r gentoo
          docker exec gentoo-builder mkdir -p /packages
          docker exec gentoo-builder emerge --verbose --buildpkg --onlydeps www-client/epiphany
          docker exec gentoo-builder emerge --verbose --buildpkg www-client/epiphany

          # Extract the binary package
          docker cp gentoo-builder:/packages .

      - name: Upload Binary Package
        uses: actions/upload-artifact@v4
        with:
          name: epiphany-gentoo-binary
          path: packages/
