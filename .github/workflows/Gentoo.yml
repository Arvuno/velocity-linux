name: Build Gentoo Binary
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gentoo Build
        run: |
          # Start the container
          docker run --privileged --name gentoo-builder -d gentoo/stage3:amd64-nomultilib tail -f /dev/null
          
          # Setup make.conf with YOUR EXACT FLAGS from the photo
          docker exec gentoo-builder bash -c 'cat > /etc/portage/make.conf << EOF
          COMMON_FLAGS="-O2 -march=native -pipe"
          CFLAGS="\${COMMON_FLAGS}"
          CXXFLAGS="\${COMMON_FLAGS}"
          MAKEOPTS="-j3"
          USE="wayland elogind dbus vulkan intel -systemd -bluetooth -wifi -cdrom -floppy -dvd -dvdr -cups -kde -gnome -plasma -aqua -qt5 -qt6 -X -accessibility -branding -ipod -smartcard -kvm"
          VIDEO_CARDS="intel i965"
          INPUT_DEVICES="libinput"
          ACCEPT_LICENSE="*"
          PKGDIR="/packages"
          EOF'

          # Faster, more reliable sync for GitHub Actions
          docker exec gentoo-builder mkdir -p /var/db/repos/gentoo
          docker exec gentoo-builder emerge-webrsync

          # Build dependencies first, then the browser
          docker exec gentoo-builder mkdir -p /packages
          docker exec gentoo-builder emerge --verbose --buildpkg --onlydeps www-client/epiphany
          docker exec gentoo-builder emerge --verbose --buildpkg www-client/epiphany

          # Extract the binary package
          docker cp gentoo-builder:/packages .

      - name: Upload Binary Package
        uses: actions/upload-artifact@v4
        with:
          name: epiphany-gentoo-binary
          path: packa ges/
