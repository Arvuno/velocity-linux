name: Build Velocity ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Monthly build

env:
  ISO_NAME: velocity-linux

jobs:
  build-iso:
    runs-on: ubuntu-latest 
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Clean up GitHub runner disk
      run: |
        # Free up maximum space on the 14GB runner
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /image
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/lib/node_modules
        sudo apt-get clean
        sudo apt-get autoremove -y
        sudo rm -rf /var/lib/apt/lists/*
        docker image prune -a -f
        echo "=== Available space after cleanup ==="
        df -h
      
    - name: Set file permissions
      run: |
        chmod 755 releng/airootfs/usr/share/backgrounds
        chmod 755 releng/airootfs/usr/share/backgrounds/velocity
        chmod 644 releng/airootfs/usr/share/backgrounds/velocity/default-wallpaper.jpg
    
  
    - name: Debug compression settings
      run: |
        docker run --rm \
          -v "$(pwd):/workspace" \
          archlinux:latest \
          /bin/bash -c "
            echo '=== Your profiledef.sh compression setting ==='
            grep '_squashfscomp' /workspace/releng/profiledef.sh
            echo '=== Testing available compressors ==='
            pacman -Syu --noconfirm squashfs-tools
            echo 'test' > /tmp/test.txt
            mksquashfs /tmp/test.txt /tmp/test.sfs -comp zstd && echo 'zstd: WORKS' || echo 'zstd: FAILED'
            mksquashfs /tmp/test.txt /tmp/test.sfs -comp gzip && echo 'gzip: WORKS' || echo 'gzip: FAILED'
          "
      
    - name: Build ISO with Docker (privileged)
      run: |
        # Run archlinux container with privileged mode for mounting
        docker run --privileged --rm \
          -v "$(pwd):/workspace" \
          -w /workspace \
          archlinux:latest \
          /bin/bash -c "
            # Download AUR helper and apps
            pacman -Syu --noconfirm base-devel git go gtk3 libxt mime-types dbus-glib nss ttf-liberation systemd ffmpeg qt6-declarative qt6-base jemalloc qt6-svg libpipewire
            cd /tmp
            git clone https://aur.archlinux.org/zen-browser-bin.git
            git clone https://aur.archlinux.org/yay.git
            git clone https://aur.archlinux.org/quickshell-git.git
            git clone https://aur.archlinux.org/google-breakpad.git
            
            # Building zen-browser
            cd zen-browser-bin
            useradd -m builder
            chown -R builder:builder .
            sudo -u builder makepkg --noconfirm --skippgpcheck --nodeps
            find *.pkg.tar.zst
            cp *.pkg.tar.zst /workspace/releng/airootfs/packages/

            # Building yay
            cd ..
            cd yay
            chown -R builder:builder .
            sudo -u builder makepkg --noconfirm --skippgpcheck
            find *.pkg.tar.zst
            cp *.pkg.tar.zst /workspace/releng/airootfs/packages/
            pacman -U --noconfirm *.pkg.tar.zst

            # Building google-breakpad
            cd ..
            cd google-breakpad
            chown -R builder:builder .
            sudo -u builder makepkg --noconfirm --skippgpcheck
            find *.pkg.tar.zst
            cp *.pkg.tar.zst /workspace/releng/airootfs/packages/
            pacman -U --noconfirm *.pkg.tar.zst

            # Building quickshell
            echo "Building qs"
            cd ..
            cd quickshell-git
            chown -R builder:builder .
            sudo -u builder makepkg --noconfirm --skippgpcheck
            find *.pkg.tar.zst
            cp *.pkg.tar.zst /workspace/releng/airootfs/packages/

            # Setting up custom local repository
            cd /workspace/releng/airootfs/packages
            repo-add -s -v packages.db.tar.gz *.pkg.tar.zst
            ln -sf packages.db.tar.gz packages.db
            ln -sf packages.files.tar.gz packages.files
            ls -la packages.*

            # Getting tools to build the iso
            pacman -Syu --noconfirm archiso squashfs-tools sed
            
            # If zstd compression fails, uncomment the line below to use gzip instead
            #sed -i 's/_squashfscomp=.*/_squashfscomp=(\"gzip\")/' /workspace/releng/profiledef.sh
            
            # Build the ISO
            cd /workspace 
            mkarchiso -v /workspace/releng 
          "
    
    - name: Get ISO info
      id: iso-info
      run: |
        # Debug: Check what files exist
        echo "=== Current directory ==="
        pwd
        echo "=== Looking for ISO files ==="
        find . -name "*.iso" -type f 2>/dev/null || echo "No ISO files found"
        echo "=== Checking ./out ==="
        ls -la out/ 2>/dev/null || echo "./out directory not found"
        cd out
        ISO_FILE=$(ls *.iso)
        ISO_SIZE=$(du -h $ISO_FILE | cut -f1)
        echo "iso_file=$ISO_FILE" >> $GITHUB_OUTPUT
        echo "iso_size=$ISO_SIZE" >> $GITHUB_OUTPUT
        echo "ISO: $ISO_FILE ($ISO_SIZE)"
    
    - name: Test ISO integrity
      run: |
        cd out
        ISO_FILE=$(ls *.iso)
        file $ISO_FILE | grep "ISO 9660"
        ISO_SIZE_BYTES=$(stat -c%s "$ISO_FILE")
        if [ $ISO_SIZE_BYTES -lt 500000000 ]; then
          echo "❌ ISO seems too small"
          exit 1
        fi
        echo "✅ ISO integrity check passed"
    
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ISO_NAME }}-${{ github.sha }}
        path: out/*.iso
        retention-days: 30
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: out/*.iso
        body: |
          Automated build of Velocity Linux
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Triggered by: ${{ github.event_name }}
          - ISO Size: ${{ steps.iso-info.outputs.iso_size }}
          
          **Verification:**
          ```bash
          sha256sum ${{ steps.iso-info.outputs.iso_file }}
          ```
