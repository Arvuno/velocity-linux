name: Build Velocity ISO

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Monthly build

env:
  ISO_NAME: velocity-linux

jobs:
  build-iso:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Build Docker image
      run: |
        docker build -t velocity-builder .
         sudo fallocate -l 6G /swapfile
         sudo chmod 600 /swapfile
         sudo mkswap /swapfile
         sudo swapon /swapfile
    
    - name: Build ISO in container
      run: |
        docker run --privileged --rm \
          -v "$(pwd):/build" \
          -w /build \
          velocity-builder \
          /bin/bash -c "
            cd releng &&
            mkarchiso -v .
          "
    
    - name: Get ISO info
      id: iso-info
      run: |
        cd releng/out
        ISO_FILE=$(ls *.iso)
        ISO_SIZE=$(du -h $ISO_FILE | cut -f1)
        echo "iso_file=$ISO_FILE" >> $GITHUB_OUTPUT
        echo "iso_size=$ISO_SIZE" >> $GITHUB_OUTPUT
        echo "ISO: $ISO_FILE ($ISO_SIZE)"
    
    - name: Test ISO integrity
      run: |
        cd releng/out
        ISO_FILE=$(ls *.iso)
        file $ISO_FILE | grep "ISO 9660"
        ISO_SIZE_BYTES=$(stat -c%s "$ISO_FILE")
        if [ $ISO_SIZE_BYTES -lt 500000000 ]; then
          echo "❌ ISO seems too small"
          exit 1
        fi
        echo "✅ ISO integrity check passed"
    
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ISO_NAME }}-${{ github.sha }}
        path: releng/out/*.iso
        retention-days: 30
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: releng/out/*.iso
        body: |
          Automated build of Velocity Linux
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Triggered by: ${{ github.event_name }}
          - ISO Size: ${{ steps.iso-info.outputs.iso_size }}
          
          **Verification:**
          ```bash
          sha256sum ${{ steps.iso-info.outputs.iso_file }}
          ```
