name: Build Velocity ISO

on:
  push:
    tags: ['v*']  # Build on version tags like v1.0.0
  workflow_dispatch:  # Allow manual triggers
  schedule:
    - cron: '0 0 1 * *'  # Monthly build to get latest packages

env:
  ISO_NAME: velocity-linux

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    
    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm archiso git sudo
    
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Validate archiso profile
      run: |
        cd releng
        # Basic validation
        test -f profiledef.sh
        test -f packages.x86_64
        echo "✅ Profile structure is valid"
    
    - name: Build ISO
      run: |
        cd releng
        # Build with current date in version
        export SOURCE_DATE_EPOCH=$(date +%s)
        mkarchiso -v .
    
    - name: Get ISO info
      id: iso-info
      run: |
        cd releng/out
        ISO_FILE=$(ls *.iso)
        ISO_SIZE=$(du -h $ISO_FILE | cut -f1)
        echo "iso_file=$ISO_FILE" >> $GITHUB_OUTPUT
        echo "iso_size=$ISO_SIZE" >> $GITHUB_OUTPUT
        echo "ISO: $ISO_FILE ($ISO_SIZE)"
    
    - name: Test ISO integrity
      run: |
        cd releng/out
        ISO_FILE=$(ls *.iso)
        # Basic integrity check
        file $ISO_FILE | grep "ISO 9660"
        # Check size is reasonable (> 500MB)
        ISO_SIZE_BYTES=$(stat -c%s "$ISO_FILE")
        if [ $ISO_SIZE_BYTES -lt 500000000 ]; then
          echo "❌ ISO seems too small, might be broken"
          exit 1
        fi
        echo "✅ ISO passed basic integrity checks"
    
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ISO_NAME }}-${{ github.sha }}
        path: releng/out/*.iso
        retention-days: 30
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: releng/out/*.iso
        body: |
          Automated build of Velocity Linux
          
          **Build Details:**
          - Commit: ${{ github.sha }}
          - Triggered by: ${{ github.event_name }}
          - ISO Size: ${{ steps.iso-info.outputs.iso_size }}
          
          **Download & Verify:**
          ```bash
          # Check SHA256
          sha256sum ${{ steps.iso-info.outputs.iso_file }}
          ```
